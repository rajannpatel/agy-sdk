summary: agy --version runs and reports the expected version

prepare: |
  envsubst '${BASE}' <workshop.yaml.in >workshop.yaml
  workshop launch

restore: |
  workshop remove || true

execute: |
  # Escape dots so MATCH treats the version literally, not as a regex.
  EXPECTED_REGEX="${EXPECTED_VERSION//./\\.}"
  workshop exec -- bash -lc 'agy --version' | MATCH "$EXPECTED_REGEX"

debug: |
  workshop exec -- bash -lc 'agy --version' || true
